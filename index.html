<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Execution Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: #f8f8f8; color: #111; }
  body { display: flex; flex-direction: column; }

  /* ── File connection bar ── */
  #file-conn-bar {
    height: 36px; flex-shrink: 0; display: flex; align-items: center; gap: 8px;
    padding: 0 14px; background: #1a0203; color: #fca5a5; font-size: 13px; font-weight: 700;
  }
  #file-conn-bar .conn-actions { margin-left: auto; display: flex; gap: 6px; }

  /* ── Layout ── */
  #app { display: flex; flex: 1; min-height: 0; overflow: hidden; }
  #sidebar {
    width: 200px; flex-shrink: 0; background: #1a0203;
    display: flex; flex-direction: column; padding: 16px 10px; gap: 6px; overflow-y: auto;
  }
  #main { flex: 1; overflow-y: auto; padding: 14px 16px; }

  /* ── Sidebar ── */
  .sb-title { font-size: 12px; font-weight: 700; color: #fca5a5; letter-spacing: 1.5px; padding-left: 4px; margin-bottom: 4px; }
  .sb-proj {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background .15s;
  }
  .sb-proj:hover { background: rgba(194,0,11,.35); }
  .sb-proj.active { background: #C2000B; }
  .sb-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .sb-name { font-size: 13px; font-weight: 700; color: #fca5a5; flex: 1; line-height: 1.3; word-break: break-all; }
  .sb-proj.active .sb-name { color: #fff; }
  .sb-proj.active .sb-dot { background: #fff !important; }
  .sb-del {
    background: rgba(255,255,255,.2); border: none; border-radius: 5px;
    color: #fff; font-size: 12px; cursor: pointer; padding: 1px 5px; font-family: inherit; display: none;
  }
  .sb-proj.active .sb-del { display: inline; }
  .sb-move { background: none; border: none; color: rgba(255,255,255,.5); font-size: 10px; cursor: pointer; padding: 0 2px; line-height: 1; display: none; }
  .sb-proj.active .sb-move { display: inline; }
  .sb-move:hover { color: #fff; }
  .sb-add {
    background: rgba(255,255,255,.08); color: #fca5a5;
    border: 1px dashed rgba(252,165,165,.4); border-radius: 10px;
    padding: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
    text-align: center; font-family: inherit; margin-top: auto;
  }
  .sb-add:hover { background: rgba(255,255,255,.14); }
  .sb-total-del {
    background: rgba(124,58,237,.25); color: #c4b5fd;
    border: 1px solid rgba(196,181,253,.35); border-radius: 10px;
    padding: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
    text-align: center; font-family: inherit; margin-top: auto;
  }
  .sb-total-del:hover { background: rgba(124,58,237,.4); }

  /* ── Total Delivery overlay ── */
  .td-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.55);
    z-index:1000; align-items:center; justify-content:center; padding:20px;
  }
  .td-overlay.show { display:flex; }
  .td-panel { background:#fff; border-radius:14px; width:100%; max-width:1100px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; }
  .td-hdr { background:#7C3AED; color:#fff; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; font-weight:800; font-size:15px; flex-shrink:0; }
  .td-body { padding:14px 16px; overflow:auto; flex:1; }
  .td-tbl { width:100%; border-collapse:collapse; font-size:13px; }
  .td-tbl th { background:#7C3AED; color:#fff; padding:7px 10px; text-align:left; font-weight:700; white-space:nowrap; }
  .td-tbl th.sortable { cursor:pointer; user-select:none; }
  .td-tbl th.sortable:hover { background:#6D28D9; }
  .td-tbl td { padding:6px 10px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
  .td-tbl tr:nth-child(even) td { background:#fafafa; }
  .td-tbl tr:hover td { background:#F5F3FF; }
  .td-comment-input { width:100%; font-size:12px; border:1px solid #e5e7eb; border-radius:5px; padding:3px 6px; background:#fff; }
  .td-comment-input:focus { outline:none; border-color:#7C3AED; }
  .td-gr-o { color:#059669; font-weight:700; }
  .td-gr-x { color:#9ca3af; }

  /* ── Common input/select ── */
  input, select, button, textarea { font-family: inherit; }
  .ei {
    border: 1.5px solid #FCA5A5; border-radius: 7px; padding: 3px 8px;
    font-size: 13px; background: #FFF5F5; color: #7f1d1d; outline: none; width: 100%;
  }
  .esel {
    border: 1.5px solid #FCA5A5; border-radius: 7px; padding: 3px 7px;
    font-size: 13px; background: #FFF5F5; color: #7f1d1d; outline: none; cursor: pointer;
  }
  .ei:focus, .esel:focus { border-color: #C2000B; }

  /* ── Buttons ── */
  .btn { background: #C2000B; color: #fff; border: none; border-radius: 8px; padding: 5px 13px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-sm { padding: 3px 9px; font-size: 12px; }
  .btn-white { background: #fff; color: #C2000B; }
  .btn-ghost { background: rgba(255,255,255,.18); color: #fff; border: 1.5px solid rgba(255,255,255,.4); }
  .btn-ghost.active { background: #fff; color: #C2000B; border: none; }
  .btn-gray { background: #475569; }
  .btn-green { background: #059669; }
  .btn-amber { background: rgba(255,255,255,.2); color: #fff; border: none; border-radius: 8px; }

  /* ── Badges ── */
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; border: 1px solid; }
  .badge-H { background: #FEE2E2; color: #991B1B; border-color: #F87171; }
  .badge-M { background: #FFFBEB; color: #92400E; border-color: #FCD34D; }
  .badge-L { background: #F0FDF4; color: #166534; border-color: #86EFAC; }

  /* ── Cards ── */
  .card { background: #fff; border: 1.5px solid #f0f0f0; border-radius: 14px; }
  .card-red { border-color: #FEE2E2; }

  /* ── Header ── */
  #dash-header {
    background: #C2000B; border-radius: 14px; padding: 11px 16px;
    margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .hdr-title { font-size: 21px; font-weight: 800; color: #fff; letter-spacing: .2px; margin-bottom: 5px; display:flex; align-items:center; flex-wrap:wrap; gap:4px; }
  .hdr-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .hdr-meta span { font-size: 13px; color: #fecaca; font-weight: 500; }
  .hdr-meta b { color: #fff; }
  .hdr-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .hdr-ei { font-size: 12px; background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.35); color: #fff; border-radius: 7px; padding: 3px 8px; outline: none; }
  .hdr-ei:focus { border-color: #fff; }
  .hdr-ei-sel { font-size: 12px; background: rgba(0,0,0,.35); border: 1.5px solid rgba(255,255,255,.35); color: #fff; border-radius: 7px; padding: 3px 6px; outline: none; }
  .hdr-ei-sel option { background: #1a0203; color: #fff; }

  /* ── Edit notice ── */
  #edit-notice {
    background: #FFF5F5; border: 1.5px solid #FCA5A5; border-radius: 10px;
    padding: 8px 13px; margin-bottom: 10px; font-size: 13px; color: #991B1B;
    display: none; align-items: center; gap: 8px;
  }
  #edit-notice.show { display: flex; }

  /* ── Save toast ── */
  #save-toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #059669; color: #fff; font-size: 14px; font-weight: 700;
    padding: 10px 18px; border-radius: 10px; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.15); z-index: 999;
  }
  #save-toast.show { display: block; }

  /* ── Timeline ── */
  #timeline-wrap { margin-bottom: 10px; }
  .tl-section-lbl { font-size: 13px; font-weight: 700; color: #C2000B; letter-spacing: 1.2px; }
  .tl-prog-bar { height: 7px; background: #FEE2E2; border-radius: 999px; overflow: hidden; margin: 8px 0 11px; }
  .tl-prog-fill { height: 100%; background: linear-gradient(90deg,#C2000B,#EF4444); border-radius: 999px; transition: width .4s; }
  #stages-grid { display: grid; gap: 4px; }
  .stage-box { border-radius: 10px; padding: 6px 4px; text-align: center; border: 1.5px solid; }
  .stage-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 4px; }
  .stage-name { font-size: 11px; font-weight: 700; line-height: 1.2; margin-bottom: 2px; }
  .stage-pct { font-size: 11px; font-weight: 600; }
  .stage-date { font-size: 10.5px; color: #9ca3af; margin-top: 2px; font-weight: 500; }
  .stage-done   { background: #FFF5F5; border-color: #C2000B; }
  .stage-active { background: #FEE2E2; border-color: #C2000B; }
  .stage-delayed{ background: #FEE2E2; border-color: #7f1d1d; }
  .stage-planned{ background: #f9fafb; border-color: #e5e7eb; }
  .stage-done .stage-dot   { background: #C2000B; }
  .stage-active .stage-dot { background: #C2000B; box-shadow: 0 0 0 3px rgba(194,0,11,.2); }
  .stage-delayed .stage-dot{ background: #7f1d1d; }
  .stage-planned .stage-dot{ background: #d1d5db; }
  .stage-done .stage-name, .stage-active .stage-name { color: #991B1B; }
  .stage-delayed .stage-name { color: #7f1d1d; }
  .stage-planned .stage-name { color: #6b7280; }
  .stage-done .stage-pct, .stage-active .stage-pct { color: #C2000B; }
  .stage-planned .stage-pct { color: #9ca3af; }

  /* ── Bottom grid ── */
  #bottom-grid { display: grid; grid-template-columns: 1fr 310px; gap: 10px; align-items: start; }

  /* ── Category panel ── */
  #cats-wrap { margin-bottom: 10px; }
  .sec-lbl { font-size: 13px; font-weight: 700; color: #C2000B; letter-spacing: 1.2px; margin-bottom: 8px; }
  #filter-row { display: flex; gap: 5px; margin-bottom: 11px; flex-wrap: wrap; }
  .flt-btn {
    font-size: 12px; padding: 3px 10px; border-radius: 20px; cursor: pointer;
    border: 1.5px solid #d1d5db; background: transparent; color: #6b7280;
    font-weight: 700; transition: all .15s;
  }
  .flt-btn.active { background: #C2000B; color: #fff; border-color: #C2000B; }
  #cats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }

  /* ── Category cards ── */
  .cat-card {
    border-radius: 12px; padding: 9px 11px;
    border: 1.5px solid #e5e7eb; background: #fff;
    cursor: pointer; transition: box-shadow .15s, border-color .15s; position: relative;
  }
  .cat-card:hover { box-shadow: 0 4px 16px rgba(194,0,11,.12); border-color: #FCA5A5; }
  .cat-card.selected { border-color: #C2000B; box-shadow: 0 0 0 3px #FEF2F2; }
  .cat-card.edit-mode { cursor: default; }
  .cat-card.edit-mode:hover { box-shadow: none; border-color: #e5e7eb; }
  .cat-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
  .open-cnt {
    width: 21px; height: 21px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .cat-name { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 4px; line-height: 1.2; }
  .cat-status { font-size: 12px; display: flex; align-items: center; gap: 3px; margin-bottom: 3px; font-weight: 600; }
  .cat-status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .cat-footer { display: flex; justify-content: space-between; font-size: 11px; color: #9ca3af; font-weight: 500; gap: 4px; }
  .cat-del-btn {
    position: absolute; top: 4px; right: 4px;
    background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 6px;
    color: #C2000B; font-size: 12px; cursor: pointer; padding: 1px 5px; line-height: 1.5; display: none;
  }

  /* ── Detail panel ── */
  #detail-panel { border-radius: 14px; overflow: hidden; margin-top: 10px; display: none; border: 1.5px solid #FEE2E2; }
  #detail-panel.show { display: block; }

  /* ── Delivery/GR/IR checklist card ── */
  #checklist-card { margin-top: 10px; }
  .chk-hdr { display: flex; align-items: center; gap: 7px; padding: 13px 15px; }
  .chk-chevron { font-size: 12px; color: #C2000B; width: 10px; flex-shrink: 0; }
  .chk-body { padding: 0 15px 13px; }
  .chk-tbl { width: 100%; border-collapse: collapse; }
  .chk-tbl th { font-size: 11px; color: #9ca3af; font-weight: 700; text-align: left; padding: 4px 6px; border-bottom: 1.5px solid #f0f0f0; text-transform: uppercase; letter-spacing: .3px; }
  .chk-tbl th.chk-col, .chk-tbl td.chk-cell { text-align: center; width: 56px; }
  .chk-tbl td { padding: 5px 6px; border-bottom: 1px solid #f7f7f7; font-size: 13px; vertical-align: middle; }
  .chk-name-cell input.ei { width: 100%; }
  .chk-toggle { width: 27px; height: 27px; border-radius: 8px; border: none; font-weight: 800; font-size: 13px; cursor: pointer; }
  .chk-o { background: #ECFDF5; color: #059669; }
  .chk-x { background: #FEF2F2; color: #C2000B; }
  .chk-del-cell { width: 22px; text-align: center; }
  .chk-date-cell { text-align: center; width: 84px; }
  .chk-date-input { width: 100%; font-size: 11px; padding: 3px 5px; }
  .chk-num-cell { text-align: center; width: 84px; }
  .chk-num-input { width: 100%; font-size: 11px; padding: 3px 5px; text-align: center; }
  .chk-warn-col { width: 52px; padding: 0 2px !important; }
  .chk-warn-cell { text-align: center; width: 52px; padding: 2px !important; cursor: default; }
  .chk-warn-badge {
    display: inline-block; background: #C2000B; color: #fff;
    font-size: 10px; font-weight: 800; padding: 2px 5px; border-radius: 6px;
    letter-spacing: .3px; animation: warnPulse 1.4s ease-in-out infinite;
    white-space: nowrap;
  }
  .chk-warn-overdue {
    background: #450a0a; color: #fca5a5;
  }
  @keyframes warnPulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: .7; transform: scale(1.08); }
  }
  .chk-row-done { background: #f3f4f6 !important; color: #9ca3af; }
  .chk-row-done td { color: #9ca3af; background: #f3f4f6 !important; }
  .chk-row-done .chk-name-cell span { text-decoration: line-through; }
  .chk-date-text { font-size: 11px; color: #6b7280; font-weight: 500; }
  .chk-grp { border: 1.5px solid #f5f5f5; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .chk-grp:last-child { margin-bottom: 0; }
  .chk-grp-hdr { display: flex; align-items: center; gap: 7px; padding: 8px 10px; cursor: pointer; background: #FFF8F8; user-select: none; }
  .chk-grp-hdr .chk-chevron { font-size: 11px; }
  .chk-grp-name { font-size: 13px; font-weight: 700; color: #111; flex: 1; }
  .chk-grp-name-input { flex: 1; font-weight: 700; }
  .chk-grp-del { background: none; border: none; color: #C2000B; font-size: 13px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .chk-grp-poso { display: flex; gap: 5px; flex-shrink: 0; }
  .chk-poso-input { width: 84px; font-size: 11px; padding: 3px 6px; }
  .chk-grp-poso-disp { font-size: 11px; color: #9ca3af; font-weight: 600; flex-shrink: 0; white-space: nowrap; }
  .chk-grp-body { padding: 8px 10px 10px; }
  .chk-add-grp-btn { margin-top: 6px; }

  /* ── Mail summary (Power Automate) ── */
  .mail-summary-section .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  #mail-last-updated { font-size: 11px; color: #9ca3af; font-weight: 600; }
  .mail-summary-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 10px; }
  .mail-empty { padding: 16px; text-align: center; color: #9ca3af; font-size: 13px; grid-column: 1 / -1; }
  .mail-card { background: #fff; border: 1.5px solid #f0f0f0; border-left: 5px solid #d1d5db; border-radius: 12px; padding: 11px 13px; }
  .mail-risk-red { border-left-color: #C2000B; }
  .mail-risk-amber { border-left-color: #D97706; }
  .mail-risk-green { border-left-color: #059669; }
  .mail-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .mail-project { font-size: 11px; font-weight: 700; color: #6b7280; }
  .mail-time { font-size: 11px; color: #9ca3af; margin-left: auto; font-weight: 600; }
  .mail-subject { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 4px; line-height: 1.35; }
  .mail-summary-text { font-size: 13px; color: #374151; line-height: 1.5; margin-bottom: 8px; }
  .mail-meta-row { font-size: 12px; color: #374151; margin-bottom: 8px; }
  .mail-foot-row { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: #6b7280; border-top: 1px solid #f3f4f6; padding-top: 7px; }
  .mail-reply-yes { color: #C2000B; font-weight: 700; }
  .mail-reply-no { color: #6b7280; }
  .badge-C { background: #450a0a; color: #FECACA; border-color: #7f1d1d; }
  .dp-header { background: #C2000B; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
  .dp-title { font-size: 14px; font-weight: 700; color: #fff; }
  .dp-close { background: rgba(255,255,255,.2); border: none; color: #fff; cursor: pointer; font-size: 13px; border-radius: 6px; padding: 2px 9px; font-weight: 700; }
  .dp-body { padding: 11px 15px; background: #fff; }
  .dp-kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 11px; }
  .dp-kpi { background: #f9fafb; border-radius: 10px; padding: 8px; text-align: center; }
  .dp-kpi.red { border: 1.5px solid #FEE2E2; }
  .dp-kpi-val { font-size: 22px; font-weight: 700; color: #111; }
  .dp-kpi.red .dp-kpi-val { color: #C2000B; }
  .dp-kpi-lbl { font-size: 11px; color: #6b7280; margin-top: 2px; font-weight: 600; }

  /* ── Issue table ── */
  .issue-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .issue-tbl th { background: #C2000B; color: #fff; padding: 5px 7px; text-align: left; font-weight: 700; white-space: nowrap; }
  .issue-tbl td { padding: 5px 7px; border-bottom: 0.5px solid #f0f0f0; vertical-align: middle; }
  .issue-tbl tr:nth-child(even) td { background: #fafafa; }
  .issue-tbl tr.closed-row { opacity: .42; }
  .issue-tbl tr.closed-row .issue-desc { text-decoration: line-through; color: #9ca3af; }
  .status-sel-closed { background: #F3F4F6 !important; color: #9CA3AF !important; border-color: #D1D5DB !important; }
  .pbadge { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 20px; font-weight: 700; }
  .pbadge-H { background: #FEE2E2; color: #991B1B; border: 1px solid #F87171; }
  .pbadge-M { background: #FFFBEB; color: #92400E; border: 1px solid #FCD34D; }
  .pbadge-L { background: #F0FDF4; color: #166534; border: 1px solid #86EFAC; }
  .del-issue-btn { background: none; border: none; color: #C2000B; font-size: 16px; cursor: pointer; padding: 2px 4px; }

  /* ── Category update log (date / description / photo) ── */
  .upd-row { display: flex; align-items: center; gap: 10px; padding: 6px 2px; position: relative; }
  .upd-row.edit-mode { flex-wrap: wrap; padding-right: 22px; }
  .upd-date { font-size: 12px; color: #6b7280; font-weight: 600; white-space: nowrap; min-width: 80px; }
  .upd-desc { font-size: 13px; color: #111; flex: 1; line-height: 1.4; }
  .upd-desc-input { flex: 1; min-width: 140px; }
  .upd-photo-preview { width: 120px; height: 84px; object-fit: cover; border-radius: 8px; border: 1.5px solid #f0f0f0; flex-shrink: 0; }
  .upd-photo-area { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .upd-photo-btn { cursor: pointer; white-space: nowrap; }
  .upd-del-btn { position: absolute; top: 2px; right: 0; }
  .chk-mail-btn { padding: 2px 6px; font-size: 13px; line-height: 1.2; }

  /* ── Photo lightbox ── */
  .lightbox-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.82);
    z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox-overlay.show { display: flex; }
  .lightbox-overlay img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 10px; cursor: default; }
  .lightbox-close {
    position: absolute; top: 18px; right: 22px; background: rgba(255,255,255,.15); border: none;
    color: #fff; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  }
  .lightbox-close:hover { background: rgba(255,255,255,.3); }
  .upd-photo-preview { cursor: zoom-in; }

  /* ── GR mail modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box { background: #fff; border-radius: 14px; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-hdr { background: #C2000B; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 14px; }
  .modal-close { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; }
  .modal-body { padding: 14px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .modal-lbl { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .3px; margin-top: 8px; }
  .modal-ftr { padding: 12px 16px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .btn-outline { background: #fff; color: #C2000B; border: 1.5px solid #fca5a5; }

  /* ── Right panel ── */
  #right-col { display: flex; flex-direction: column; gap: 8px; }
  .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 11px; }
  .kpi-box { background: #f9fafb; border-radius: 10px; padding: 9px; text-align: center; border: 1.5px solid #FEE2E2; }
  .kpi-val { font-size: 24px; font-weight: 700; color: #C2000B; }
  .kpi-lbl { font-size: 12px; color: #6b7280; margin-top: 2px; font-weight: 600; }
  .risk-box { border-radius: 10px; padding: 9px; text-align: center; }
  .risk-val { font-size: 16px; font-weight: 700; }
  .risk-lbl { font-size: 12px; margin-top: 2px; opacity: .85; font-weight: 600; }
  .sum-card { border-radius: 14px; overflow: hidden; border: 1.5px solid #FEE2E2; }
  .sum-hdr { padding: 8px 13px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; border-bottom: 1.5px solid; }
  .sum-body { padding: 8px 13px; background: #fff; }
  .sum-item { display: flex; align-items: flex-start; gap: 5px; padding: 3px 0; font-size: 13px; color: #4b5563; line-height: 1.5; }
  .sum-arrow { font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .sum-text { font-weight: 500; flex: 1; }
  .sum-ei { border: 1.5px solid #FCA5A5; border-radius: 7px; padding: 3px 8px; font-size: 13px; background: #FFF5F5; color: #7f1d1d; outline: none; flex: 1; }
  .sum-del { background: none; border: none; color: #C2000B; font-size: 15px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .foot-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .foot-card { border-radius: 12px; padding: 11px; text-align: center; }

  /* ── VO (Variation Order) contract value history ── */
  .vo-totals { display: flex; gap: 6px; padding: 8px 13px; background: #F0FDF4; border-bottom: 1.5px solid #86EFAC; }
  .vo-tot-box { flex: 1; text-align: center; }
  .vo-tot-lbl { font-size: 10.5px; color: #065F46; font-weight: 700; letter-spacing: .3px; }
  .vo-tot-val { font-size: 14px; color: #065F46; font-weight: 700; margin-top: 2px; }
  .vo-item { padding: 7px 0; border-bottom: 1px dashed #E5E7EB; }
  .vo-item:last-child { border-bottom: none; }
  .vo-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .vo-id { font-size: 12px; font-weight: 700; color: #065F46; }
  .vo-date { font-size: 11px; color: #9ca3af; font-weight: 600; }
  .vo-desc { font-size: 13px; color: #374151; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
  .vo-price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .vo-before { font-size: 12.5px; color: #9ca3af; text-decoration: line-through; }
  .vo-arrow { font-size: 13px; color: #9ca3af; }
  .vo-after { font-size: 14px; font-weight: 700; color: #111; }
  .vo-delta { font-size: 11.5px; font-weight: 700; padding: 1px 7px; border-radius: 6px; }
  .vo-delta.up { background: #ECFDF5; color: #059669; }
  .vo-delta.down { background: #FEF2F2; color: #C2000B; }
  .vo-delta.flat { background: #F3F4F6; color: #6b7280; }
  .vo-edit-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .vo-del-btn { background: none; border: none; color: #C2000B; font-size: 14px; cursor: pointer; position: absolute; top: 7px; right: 0; }
  .fin-highlight { background: #ECFDF5; padding: 12px 13px; text-align: center; border-bottom: 1.5px solid #86EFAC; }
  .fin-highlight-lbl { font-size: 11px; font-weight: 700; color: #065F46; letter-spacing: .4px; }
  .fin-highlight-val { font-size: 23px; font-weight: 800; color: #065F46; margin-top: 2px; }
  .fin-highlight-sub { font-size: 11.5px; color: #059669; margin-top: 3px; font-weight: 600; }

  /* ── Financial Aspect: wide & thin horizontal layout ── */
  .fin-row { display: flex; align-items: stretch; gap: 0; min-height: 0; }
  .fin-col { display: flex; flex-direction: column; padding: 10px 14px; min-width: 0; }
  .fin-col-title { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; white-space: nowrap; }
  .fin-col-highlight { flex: 0 0 172px; background: #ECFDF5; border-right: 1.5px solid #86EFAC; justify-content: center; text-align: center; padding: 10px 12px; }
  .fin-col-highlight .fin-highlight-lbl { font-size: 10px; }
  .fin-col-highlight .fin-highlight-val { font-size: 18px; margin-top: 2px; }
  .fin-col-highlight .fin-highlight-sub { font-size: 10px; margin-top: 3px; line-height: 1.4; }
  .fin-col-notes { flex: 0 0 190px; }
  .fin-notes-list { max-height: 72px; overflow-y: auto; }
  .fin-col-divider { width: 2px; background: #E5E7EB; flex-shrink: 0; margin: 8px 0; }
  .fin-col-vo { flex: 1; }
  .fin-vo-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; align-items: stretch; }
  .vo-chip { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 9px; min-width: 148px; flex-shrink: 0; position: relative; }
  .vo-chip-edit { min-width: 148px; padding-top: 18px; }
  .vo-chip-top { display: flex; justify-content: space-between; gap: 5px; font-size: 10.5px; color: #6b7280; font-weight: 700; margin-bottom: 3px; }
  .vo-chip-desc { font-size: 11px; color: #374151; font-weight: 500; margin-bottom: 5px; line-height: 1.3; }
  .vo-chip-price { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; font-size: 10.5px; color: #6b7280; }
  .vo-chip-delta { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 5px; }
  .vo-chip-delta.up { background: #ECFDF5; color: #059669; }
  .vo-chip-delta.down { background: #FEF2F2; color: #C2000B; }
  .vo-chip-delta.flat { background: #F3F4F6; color: #6b7280; }
  .vo-add-chip { flex-shrink: 0; align-self: center; }
  .fin-vo-section { padding: 7px 13px 11px; border-top: 1px solid #F3F4F6; }
  .fin-vo-hdr { font-size: 11.5px; font-weight: 700; color: #6b7280; letter-spacing: .4px; margin-bottom: 4px; text-transform: uppercase; }
  .foot-lbl { font-size: 11.5px; font-weight: 700; margin-bottom: 4px; }
  .foot-val { font-size: 13px; font-weight: 700; color: #fff; }

  /* ── Responsive ── */
  @media(max-width:900px) {
    #bottom-grid { grid-template-columns: 1fr; }
    #cats-grid { grid-template-columns: repeat(2,1fr); }
  }
  @media(max-width:600px) {
    #app { flex-direction: column; height: auto; }
    #sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; min-height: auto; }
    #cats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

// STORAGE  (read/write directly to a JSON file in a SharePoint/OneDrive synced folder)
// ═══════════════════════════════════════════
let fileHandle = null;
let lastStamp = null; // for conflict detection: timestamp of the last save I read or wrote
const FS_SUPPORTED = "showOpenFilePicker" in window;

// --- Save the file handle in IndexedDB so the same browser can auto-reconnect next time ---
function idbOpen(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open("dash-fs-db",1);
    req.onupgradeneeded = ()=> req.result.createObjectStore("kv");
    req.onsuccess = ()=> res(req.result);
    req.onerror = ()=> rej(req.error);
  });
}
async function idbSet(k,v){
  const db = await idbOpen();
  return new Promise((res)=>{
    const tx = db.transaction("kv","readwrite");
    tx.objectStore("kv").put(v,k);
    tx.oncomplete = ()=>res();
  });
}
async function idbGet(k){
  const db = await idbOpen();
  return new Promise((res)=>{
    const tx = db.transaction("kv","readonly");
    const req = tx.objectStore("kv").get(k);
    req.onsuccess = ()=> res(req.result||null);
    req.onerror = ()=> res(null);
  });
}

function setConnUI(state, name){
  const icon = document.getElementById("file-conn-icon");
  const status = document.getElementById("file-conn-status");
  const refreshBtn = document.getElementById("refresh-btn");
  if(state==="connected"){
    icon.textContent = "🟢";
    status.textContent = "Connected: " + name;
    refreshBtn.style.display = "inline-block";
  } else if(state==="need-reconnect"){
    icon.textContent = "🟡";
    status.textContent = name + " — Permission needs to be reconfirmed. Please click 'Open Existing File' again.";
    refreshBtn.style.display = "none";
  } else {
    icon.textContent = "⚪";
    status.textContent = FS_SUPPORTED
      ? "Not connected to a data file"
      : "This browser is not supported. Please open this in the latest version of Edge.";
    refreshBtn.style.display = "none";
  }
}

async function connectExisting(){
  if(!FS_SUPPORTED){ alert("This feature is only available in the latest version of Edge (or Chrome)."); return; }
  try{
    const [h] = await window.showOpenFilePicker({
      types:[{description:"Dashboard data file", accept:{"application/json":[".json"]}}]
    });
    fileHandle = h;
    try{ await idbSet("dataFileHandle", h); }catch(e){ /* auto-reconnect convenience only, not critical */ }
    await loadFromFile();
  }catch(e){ /* user cancelled the picker */ }
}

async function createNew(){
  if(!FS_SUPPORTED){ alert("This feature is only available in the latest version of Edge (or Chrome)."); return; }
  try{
    const h = await window.showSaveFilePicker({
      suggestedName:"dashboard-data.json",
      types:[{description:"Dashboard data file", accept:{"application/json":[".json"]}}]
    });
    fileHandle = h;
    try{ await idbSet("dataFileHandle", h); }catch(e){ /* auto-reconnect convenience only, not critical */ }
    const pid = "proj_"+Date.now();
    const s = sampleProject();
    projects = [{id:pid,name:s.meta.name,color:BRAND}];
    projData = {[pid]: s};
    activeId = pid;
    mailSummary = [];
    await writeToFile();
    setConnUI("connected", h.name);
    render();
  }catch(e){ /* user cancelled */ }
}

async function refreshFromFile(){
  if(!fileHandle) return;
  await loadFromFile();
}

async function loadFromFile(){
  try{
    const file = await fileHandle.getFile();
    const text = await file.text();
    const data = text.trim() ? JSON.parse(text) : null;
    if(data && data.projects && data.projects.length){
      projects = data.projects;
      projData = data.projData || {};
      activeId = projects[0].id;
      lastStamp = data._stamp || file.lastModified;
    } else {
      const pid = "proj_"+Date.now();
      const s = sampleProject();
      projects = [{id:pid,name:s.meta.name,color:BRAND}];
      projData = {[pid]: s};
      activeId = pid;
    }
    mailSummary = (data && Array.isArray(data.mailSummary)) ? data.mailSummary : [];
    editMode = false; selCatId = null; filterBy = "all";
    setConnUI("connected", fileHandle.name);
    render();
  }catch(e){
    console.error("loadFromFile error:", e);
    alert("There was a problem reading the file. Please reconnect.\n\n(Details: " + (e && e.message ? e.message : e) + ")");
    setConnUI("disconnected");
  }
}

async function writeToFile(){
  if(!fileHandle){
    alert("Please connect a data file first using 'Open Existing File' or 'Create New File'.");
    return false;
  }
  try{
    let perm = await fileHandle.queryPermission({mode:"readwrite"});
    if(perm !== "granted") perm = await fileHandle.requestPermission({mode:"readwrite"});
    if(perm !== "granted"){ alert("Save permission was denied."); return false; }
  }catch(e){ alert("An error occurred while checking save permission."); return false; }

  // Conflict detection: check if another teammate saved before me since my last read
  // Also: preserve whatever mail-related fields are currently on disk, since Power Automate
  // writes to this same file independently and the dashboard should never clobber it.
  try{
    const current = await fileHandle.getFile();
    const onDiskText = await current.text();
    const onDisk = onDiskText.trim() ? JSON.parse(onDiskText) : null;
    if(onDisk && onDisk._stamp && lastStamp && onDisk._stamp !== lastStamp){
      const proceed = confirm("Another team member has saved changes in the meantime.\nOverwrite with your changes?\n(We recommend clicking Cancel and using '🔄 Refresh' to check the latest content first)");
      if(!proceed) return false;
    }
    if(onDisk && Array.isArray(onDisk.mailSummary)){
      mailSummary = onDisk.mailSummary;
    }
  }catch(e){ /* proceed with save even if comparison fails */ }

  const stamp = Date.now();
  const writable = await fileHandle.createWritable();
  await writable.write(JSON.stringify({_stamp:stamp, projects, projData, mailSummary}, null, 2));
  await writable.close();
  lastStamp = stamp;
  renderMailSummary();
  return true;
}

async function tryAutoConnect(){
  setConnUI("disconnected");
  if(!FS_SUPPORTED){ render(); return; }
  let h = null;
  try{ h = await idbGet("dataFileHandle"); }catch(e){}
  if(!h){ render(); return; }
  try{
    const perm = await h.queryPermission({mode:"readwrite"});
    if(perm === "granted"){
      fileHandle = h;
      await loadFromFile();
      return;
    }
  }catch(e){}
  setConnUI("need-reconnect", h.name);
  render();
}

// Migrate older flat-item data (saved before categories existed) into a single default group
function migrateChecklist(d){
  if(!d.deliveryChecklist){ d.deliveryChecklist = []; return; }
  const list = d.deliveryChecklist;
  if(list.length && list[0] && !("items" in list[0])){
    d.deliveryChecklist = [{id:Date.now(), name:"General", collapsed:false, items:list}];
  }
}

function toggleChecklistCardCollapse(){
  checklistCardCollapsed = !checklistCardCollapsed;
  renderChecklist();
}

function vesselNameFromIndex(hullNum, idx){
  const base = parseInt(hullNum);
  if(!isNaN(base) && base > 0) return String(base + idx);
  return hullNum ? `${hullNum}-${idx+1}` : `Vessel #${idx+1}`;
}

function syncDeliveryVessels(d){
  const count = parseInt(d.meta.seriesCount)||0;
  if(!count) return; // no series mode: leave checklist as-is
  const hullNum = (d.meta.hullNum||"").trim();
  if(!d.deliveryChecklist) d.deliveryChecklist = [];

  for(let i=0; i<count; i++){
    const name = vesselNameFromIndex(hullNum, i);
    if(d.deliveryChecklist[i]){
      // always keep name in sync with hull/series settings
      d.deliveryChecklist[i].name = name;
    } else {
      d.deliveryChecklist.push({
        id: Date.now()+i,
        name,
        collapsed: false,
        poNumber: "",
        soNumber: "",
        items: defaultChecklistItems()
      });
    }
  }
}

function renderChecklist(){
  const d = getCurrent(); if(!d) return;
  migrateChecklist(d);
  syncDeliveryVessels(d);
  const groups = d.deliveryChecklist;
  const el = document.getElementById("checklist-card");

  const groupsHtml = groups.length
    ? groups.map((g,gi)=>renderChecklistGroup(g,gi)).join("")
    : `<div style="padding:10px 0;text-align:center;color:#9ca3af;font-size:13px">No vessels yet</div>`;

  const addGroupBtn = editMode
    ? `<button class="btn btn-sm chk-add-grp-btn" onclick="addChecklistGroup()">+ Add Vessel</button>` : "";

  el.innerHTML = `
    <div class="chk-hdr" style="justify-content:space-between;cursor:pointer;" onclick="toggleChecklistCardCollapse()">
      <span class="sec-lbl" style="margin-bottom:0;display:flex;align-items:center;gap:6px;">
        <span class="chk-chevron">${checklistCardCollapsed?"▸":"▾"}</span>DELIVERY / GR / IR STATUS
      </span>
      <span style="display:flex;align-items:center;gap:5px;" onclick="event.stopPropagation()">
        <span style="font-size:11px;color:#9ca3af;font-weight:700;">INCOTERMS</span>
        <select class="esel" style="width:auto;font-size:11px;font-weight:700;"
          onchange="getCurrent().incoterms=this.value;renderChecklist()">
          ${opts(["EXW","FCA","FOB","FAS","CFR","CIF","CPT","CIP","DAP","DPU","DDP"], d.incoterms||"FOB")}
        </select>
      </span>
    </div>
    ${checklistCardCollapsed ? "" : `<div class="chk-body">${groupsHtml}${addGroupBtn}</div>`}`;
}

function renderChecklistGroup(g, gi){
  const nameHtml = editMode
    ? `<input class="ei chk-grp-name-input" value="${esc(g.name)}" onclick="event.stopPropagation()"
        oninput="getCurrent().deliveryChecklist[${gi}].name=this.value">`
    : `<span class="chk-grp-name">${esc(g.name)||"Untitled"}</span>`;
  const delGroupBtn = editMode
    ? `<button class="chk-grp-del" onclick="event.stopPropagation();deleteChecklistGroup(${gi})">✕</button>` : "";

  const poSoHtml = `<span class="chk-grp-poso" onclick="event.stopPropagation()">
        <input class="ei chk-poso-input" placeholder="PO No." value="${esc(g.poNumber)}"
          oninput="getCurrent().deliveryChecklist[${gi}].poNumber=this.value">
        <input class="ei chk-poso-input" placeholder="SO No." value="${esc(g.soNumber)}"
          oninput="getCurrent().deliveryChecklist[${gi}].soNumber=this.value">
      </span>`;

  let itemsHtml = "";
  if(!g.collapsed){
    if(!g.items.length){
      itemsHtml = `<div style="padding:8px 0;text-align:center;color:#9ca3af;font-size:13px">No items yet</div>`;
    } else {
      const cellBtn = (val,field,ii)=>{
        const isO = val==="O";
        return `<button class="chk-toggle ${isO?"chk-o":"chk-x"}" onclick="toggleChecklistCell(${gi},${ii},'${field}')">${val||"X"}</button>`;
      };
      const dateField = (val,field,ii)=>
        `<input class="ei chk-date-input" placeholder="Date" value="${esc(val)}"
            oninput="getCurrent().deliveryChecklist[${gi}].items[${ii}].${field}=this.value">`;
      const numField = (val,field,ii)=>
        `<input type="number" class="ei chk-num-input" value="${val===undefined||val===null||val===""?"":esc(val)}"
            oninput="getCurrent().deliveryChecklist[${gi}].items[${ii}].${field}=this.value">`;

      const incoterms = (getCurrent().incoterms || "FOB").toUpperCase();
      const showShippingDoc = incoterms !== "DDP";
      const showCustoms     = incoterms !== "DAP";
      const showBondCert    = incoterms === "DAP"; // 보세필증

      const ORIGIN_THRESHOLDS = {CN:14, EU:90, KR:7};

      function parseDateOnly(dateStr){
        if(!dateStr) return null;
        const d = new Date(dateStr);
        if(isNaN(d.getTime())) return null;
        d.setHours(0,0,0,0);
        return d;
      }

      // TODAY is recalculated live on every render
      const todayDate = new Date(); todayDate.setHours(0,0,0,0);

      const rows = g.items.map((it,ii)=>{
        const nameCell = editMode
          ? `<input class="ei" value="${esc(it.name)}" oninput="getCurrent().deliveryChecklist[${gi}].items[${ii}].name=this.value">`
          : `<span>${esc(it.name)||"—"}</span>`;
        const delCell = editMode ? `<button class="del-issue-btn" onclick="deleteChecklistItem(${gi},${ii})">✕</button>` : "";
        const rowCls = it.delivery==="O" ? "chk-row-done" : "";

        // Warning: Site Required Date - TODAY vs threshold
        const origin = it.origin||"CN";
        const threshold = ORIGIN_THRESHOLDS[origin]??14;
        const siteDate = parseDateOnly(it.siteRequiredDate);
        const daysLeft = siteDate ? Math.floor((siteDate - todayDate) / (1000*60*60*24)) : null;
        const warn = daysLeft!==null && daysLeft<=threshold && it.delivery!=="O";
        const overdue = warn && daysLeft<0;
        const warnTitle = daysLeft!==null
          ? (overdue ? `D+${Math.abs(daysLeft)} 초과! (${origin} 기준 ${threshold}일 이하 경고)` : `D-${daysLeft} 남음 (${origin} 기준 ${threshold}일 이하 경고)`)
          : "Site Required Date 미입력";
        const warnCell = warn
          ? `<td class="chk-warn-cell" title="${warnTitle}"><span class="chk-warn-badge${overdue?" chk-warn-overdue":""}">${overdue?"OVER":"D-"+daysLeft}</span></td>`
          : `<td class="chk-warn-cell"></td>`;

        const originCell = `<td class="chk-cell">
          <select class="esel" style="font-size:11px;padding:1px 3px;"
            onchange="getCurrent().deliveryChecklist[${gi}].items[${ii}].origin=this.value;renderChecklist()">
            ${["CN","EU","KR"].map(v=>`<option value="${v}"${origin===v?" selected":""}>${v}</option>`).join("")}
          </select>
        </td>`;

        return `<tr class="${rowCls}">
          ${warnCell}
          <td class="chk-num-cell">${numField(it.itemNo,"itemNo",ii)}</td>
          <td class="chk-name-cell">${nameCell}</td>
          ${originCell}
          <td class="chk-date-cell">${dateField(it.siteRequiredDate,"siteRequiredDate",ii)}</td>
          <td class="chk-date-cell">${dateField(it.etaPort||"","etaPort",ii)}</td>
          ${showShippingDoc ? `<td class="chk-cell">${cellBtn(it.shippingDoc,"shippingDoc",ii)}</td>` : ""}
          ${showCustoms     ? `<td class="chk-cell">${cellBtn(it.customs,"customs",ii)}</td>` : ""}
          ${showBondCert    ? `<td class="chk-cell">${cellBtn(it.bondCert||"X","bondCert",ii)}</td>` : ""}
          <td class="chk-cell">${cellBtn(it.delivery,"delivery",ii)}</td>
          <td class="chk-date-cell">${dateField(it.deliveryDate,"deliveryDate",ii)}</td>
          <td class="chk-cell">${cellBtn(it.gr,"gr",ii)}</td>
          <td class="chk-date-cell">${dateField(it.grDate,"grDate",ii)}</td>
          <td class="chk-cell">${cellBtn(it.ir,"ir",ii)}</td>
          <td class="chk-cell"><button class="btn btn-sm chk-mail-btn" title="GR 요청 메일 보내기" onclick="requestGrEmail(${gi},${ii})">✉️ GR</button></td>
          <td class="chk-cell"><button class="btn btn-sm chk-mail-btn" title="IR 요청 메일 보내기" onclick="requestIrEmail(${gi},${ii})" style="background:#1D4ED8;">✉️ IR</button></td>
          <td class="chk-del-cell">${delCell}</td>
        </tr>`;
      }).join("");

      const theadCols = [
        `<th class="chk-warn-col"></th>`,
        `<th class="chk-col">Item No</th>`,
        `<th>Item</th>`,
        `<th class="chk-col">Origin</th>`,
        `<th class="chk-col">Site Required Date</th>`,
        `<th class="chk-col">ETA PORT</th>`,
        showShippingDoc ? `<th class="chk-col">Shipping Doc</th>` : "",
        showCustoms     ? `<th class="chk-col">Customs</th>` : "",
        showBondCert    ? `<th class="chk-col">보세필증</th>` : "",
        `<th class="chk-col">Delivery</th>`,
        `<th class="chk-col">Date</th>`,
        `<th class="chk-col">GR</th>`,
        `<th class="chk-col">Date</th>`,
        `<th class="chk-col">IR</th>`,
        `<th class="chk-col">GR Request</th>`,
        `<th class="chk-col">IR Request</th>`,
        `<th></th>`,
      ].join("");

      itemsHtml = `<div style="overflow-x:auto;"><table class="chk-tbl">
        <thead><tr>${theadCols}</tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    }
  }

  const addItemBtn = (!g.collapsed && editMode)
    ? `<button class="btn btn-sm" style="margin-top:6px" onclick="addChecklistItem(${gi})">+ Add Item</button>` : "";

  return `<div class="chk-grp">
    <div class="chk-grp-hdr" onclick="toggleChecklistGroupCollapse(${gi})">
      <span class="chk-chevron">${g.collapsed?"▸":"▾"}</span>
      ${nameHtml}
      ${poSoHtml}
      <button class="btn btn-sm" style="flex-shrink:0;background:#7C3AED;font-size:11px;padding:2px 8px;"
        title="Invoice Request 메일 보내기"
        onclick="event.stopPropagation();requestInvoiceEmail(${gi})">📄 Invoice Req.</button>
      ${delGroupBtn}
    </div>
    ${!g.collapsed ? `<div class="chk-grp-body">${itemsHtml}${addItemBtn}</div>` : ""}
  </div>`;
}

let grModalGi = null, grModalIi = null;
const GR_DEFAULT_TO = "kr-marine.purchasing@abb.com";
const GR_DEFAULT_CC = "shamali.khairnar@in.abb.com, kanchan.sankangoudar@in.abb.com, ji-in.jeong@kr.abb.com";

function buildGrMailDefault(gi, ii){
  const d = getCurrent();
  const grp = d.deliveryChecklist[gi];
  const it = grp.items[ii];
  const itemNumber = it.itemNo||"-";
  const subject = `GR Request - PO ${grp.poNumber||"-"} / Item ${itemNumber}`;
  const bodyLines = [
    "Dear Marine Purchasing Korea,",
    "",
    "Could you please update the delivery date and post GR for below item?",
    `PO ${grp.poNumber||"-"} / Item ${itemNumber}`,
    "",
    "Thank you,"
  ];
  return {subject, body: bodyLines.join("\n")};
}

function requestGrEmail(gi, ii){
  grModalGi = gi; grModalIi = ii;
  const it = getCurrent().deliveryChecklist[gi].items[ii];
  if(!it.grEmail) it.grEmail = GR_DEFAULT_TO;
  if(!it.grCc) it.grCc = GR_DEFAULT_CC;
  // Keep regenerating the subject/body from the current PO/Item No/etc. every time,
  // unless the user has manually edited the text themselves (grCustomized).
  if(!it.grCustomized){
    const def = buildGrMailDefault(gi, ii);
    it.grSubject = def.subject;
    it.grBody = def.body;
  }
  document.getElementById("gr-mail-to").value = it.grEmail||"";
  document.getElementById("gr-mail-cc").value = it.grCc||"";
  document.getElementById("gr-mail-subject").value = it.grSubject||"";
  document.getElementById("gr-mail-body").value = it.grBody||"";
  document.getElementById("gr-mail-modal").classList.add("show");
}

function saveGrMailField(field, value){
  if(grModalGi===null) return;
  const it = getCurrent().deliveryChecklist[grModalGi].items[grModalIi];
  it[field] = value;
  if(field==="grSubject" || field==="grBody") it.grCustomized = true;
}

function resetGrMailDefault(){
  if(grModalGi===null) return;
  const def = buildGrMailDefault(grModalGi, grModalIi);
  const it = getCurrent().deliveryChecklist[grModalGi].items[grModalIi];
  it.grEmail = GR_DEFAULT_TO;
  it.grCc = GR_DEFAULT_CC;
  it.grSubject = def.subject;
  it.grBody = def.body;
  it.grCustomized = false;
  document.getElementById("gr-mail-to").value = it.grEmail;
  document.getElementById("gr-mail-cc").value = it.grCc;
  document.getElementById("gr-mail-subject").value = def.subject;
  document.getElementById("gr-mail-body").value = def.body;
}

function sendGrMailNow(){

/* ── MAIL SUMMARY (Power Automate appends to mailSummary[]) ── */
function escapeHtml(value){ return esc(value); }

function getRiskClass(riskLevel, prefix){
  const p = prefix || "mail-risk-";
  const v = String(riskLevel||"").trim().toLowerCase();
  if(v==="red") return p+"red";
  if(v==="amber") return p+"amber";
  if(v==="green") return p+"green";
  return "";
}

function mailPriorityCls(p){
  return {Critical:"C",High:"H",Medium:"M",Low:"L"}[p] || "M";
}

function formatDateTime(value){
  if(!value) return "—";
  const d = new Date(value);
  if(isNaN(d.getTime())) return escapeHtml(value);
  return d.toLocaleString("ko-KR", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function renderMailSummary(data){
  const list = (data !== undefined ? data : mailSummary) || [];
  const el = document.getElementById("mail-summary-list");
  const updatedEl = document.getElementById("mail-last-updated");
  if(!el) return;

  const sorted = [...list].sort((a,b)=> new Date(b.receivedDateTime||0) - new Date(a.receivedDateTime||0));
  const top20 = sorted.slice(0,20);

  if(!top20.length){
    el.innerHTML = `<div class="mail-empty">아직 요약된 메일이 없습니다.</div>`;
    if(updatedEl) updatedEl.textContent = "";
    return;
  }

  el.innerHTML = top20.map(m=>{
    const riskCls = getRiskClass(m.risk_level);
    const prioCls = mailPriorityCls(m.priority);
    const replyYes = String(m.reply_required||"").trim().toLowerCase()==="yes";
    return `<div class="mail-card ${riskCls}">
      <div class="mail-card-top">
        <span class="badge badge-${prioCls}">${escapeHtml(m.priority)||"—"}</span>
        <span class="mail-project">${escapeHtml(m.project)||"—"}</span>
        <span class="mail-time">${formatDateTime(m.receivedDateTime)}</span>
      </div>
      <div class="mail-subject">${escapeHtml(m.subject)||"(No subject)"}</div>
      <div class="mail-summary-text">${escapeHtml(m.summary_ko)}</div>
      <div class="mail-meta-row"><b>Action Required:</b> ${escapeHtml(m.action_required)||"—"}</div>
      <div class="mail-foot-row">
        <span>🏢 ${escapeHtml(m.customer_or_shipyard)||"—"}</span>
        <span>✉️ ${escapeHtml(m.from)||"—"}</span>
        <span class="${replyYes?"mail-reply-yes":"mail-reply-no"}">↩ Reply required: ${escapeHtml(m.reply_required)||"—"}</span>
      </div>
    </div>`;
  }).join("");

  if(updatedEl){
    updatedEl.textContent = `Latest: ${formatDateTime(top20[0].receivedDateTime)} · showing ${top20.length} of ${list.length}`;
  }
}

/* ── FINANCIAL: VO (Variation Order) contract value history ── */
const CURRENCY_SYMBOLS = {USD:"$", EUR:"€", KRW:"₩", JPY:"¥", GBP:"£", CNY:"¥"};

// Ensure d.seriesFinancial has the right number of entries
function ensureSeriesFinancial(d){
  const count = Math.max(1, parseInt(d.meta.seriesCount)||0);
  if(!d.seriesFinancial) d.seriesFinancial = [];
  while(d.seriesFinancial.length < count){
    // migrate existing summary data into first slot when first created
    if(d.seriesFinancial.length===0 && d.summary.voHistory && d.summary.voHistory.length){
      d.seriesFinancial.push({
        voHistory: JSON.parse(JSON.stringify(d.summary.voHistory)),
        decisions: JSON.parse(JSON.stringify(d.summary.decisions||[])),
        currency: d.summary.currency||"USD"
      });
    } else {
      d.seriesFinancial.push({voHistory:[], decisions:[], currency: d.seriesFinancial[0]?.currency||"USD"});
    }
  }
  return d.seriesFinancial;
}

// Returns the financial object for the currently selected series (or series 0 for ALL view)
function getActiveFinancial(d){
  const count = parseInt(d.meta.seriesCount)||0;
  if(!count) return d.summary; // no series mode — use legacy summary
  ensureSeriesFinancial(d);
  const idx = selFinancialIdx===-1 ? 0 : selFinancialIdx;
  return d.seriesFinancial[Math.min(idx, d.seriesFinancial.length-1)];
}

// Applies fn to just the selected series, or ALL series when selFinancialIdx===-1
function applyToFinancial(fn){
  const d = getCurrent();
  const count = parseInt(d.meta.seriesCount)||0;
  if(!count){ fn(d.summary, -1); return; }
  ensureSeriesFinancial(d);
  if(selFinancialIdx===-1){
    d.seriesFinancial.forEach((sf,i)=>fn(sf,i));
  } else {
    fn(d.seriesFinancial[selFinancialIdx], selFinancialIdx);
  }
}

function currencySymbol(){
  const d = getCurrent();
  const sf = getActiveFinancial(d);
  const code = (sf && sf.currency) || "USD";
  return CURRENCY_SYMBOLS[code] || (code+" ");
}
function fmtMoney(n){ return currencySymbol() + (Number(n)||0).toLocaleString("en-US"); }
function fmtSigned(n){
  const v = Number(n)||0;
  const sign = v>0 ? "+" : v<0 ? "-" : "";
  return sign + currencySymbol() + Math.abs(v).toLocaleString("en-US");
}

function renderFinancial(){
  const d = getCurrent(); if(!d) return;
  const el = document.getElementById("sum-decisions");
  const seriesCount = parseInt(d.meta.seriesCount)||0;

  // Build series dropdown if seriesCount is set
  let seriesDropdown = "";
  if(seriesCount > 0){
    ensureSeriesFinancial(d);
    const seriesOpts = `<option value="-1"${selFinancialIdx===-1?" selected":""}>ALL</option>`
      + Array.from({length:seriesCount},(_,i)=>`<option value="${i}"${selFinancialIdx===i?" selected":""}>#${i+1}</option>`).join("");
    const allNote = selFinancialIdx===-1 && editMode ? `<span style="font-size:10px;color:#059669;font-weight:700;margin-left:6px;">✎ 전체 적용</span>` : "";
    seriesDropdown = `<span style="display:flex;align-items:center;gap:5px;">
      <span style="font-size:10px;color:#065F46;font-weight:700;">VESSEL</span>
      <select class="esel" style="width:auto;font-size:11px;font-weight:700;color:#065F46;border-color:#86EFAC"
        onchange="selFinancialIdx=+this.value;renderFinancial()">
        ${seriesOpts}
      </select>${allNote}
    </span>`;
  }

  const sf = getActiveFinancial(d);
  const list = sf.voHistory || (sf.voHistory = []);
  const items = sf.decisions || (sf.decisions = []);

  // In ALL view mode: show summary table of all series contract values
  if(seriesCount > 0 && selFinancialIdx===-1 && !editMode){
    ensureSeriesFinancial(d);
    const rows = d.seriesFinancial.slice(0,seriesCount).map((s,i)=>{
      const vh = s.voHistory||[];
      const init = Number(s.baseValue)||0;
      const diff = vh.reduce((sum,v)=>sum+((Number(v.after)||0)-(Number(v.before)||0)), 0);
      const cur = init + diff;
      const sym = CURRENCY_SYMBOLS[s.currency||"USD"]||(s.currency+" ");
      const dClr = diff>0?"#059669":diff<0?"#C2000B":"#6b7280";
      return `<div style="flex:1;min-width:110px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px;text-align:center;">
        <div style="font-size:10px;font-weight:700;color:#9ca3af;margin-bottom:4px;">#${i+1}</div>
        <div style="font-size:17px;font-weight:800;color:#065F46;">${(init||vh.length)?sym+(cur).toLocaleString("en-US"):"—"}</div>
        <div style="font-size:10px;color:${dClr};font-weight:600;margin-top:2px;">${diff!==0?(diff>0?"+":"")+sym+Math.abs(diff).toLocaleString("en-US"):""}</div>
      </div>`;
    }).join("");
    el.innerHTML = `
      <div class="sum-hdr" style="background:#F0FDF4;color:#065F46;border-color:#86EFAC;justify-content:space-between;">
        <span>💰 Financial Aspect</span>
        ${seriesDropdown}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;">${rows}</div>`;
    return;
  }

  // Individual series or no-series mode
  const initVal  = Number(sf.baseValue)||0;
  const totalDiff = list.reduce((sum,v)=> sum + ((Number(v.after)||0)-(Number(v.before)||0)), 0);
  const curVal   = initVal + totalDiff;
  const diffClr  = totalDiff>0 ? "#059669" : totalDiff<0 ? "#C2000B" : "#6b7280";

  const highlightHtml = editMode
    ? `<div class="fin-col fin-col-highlight">
        <div class="fin-highlight-lbl">ORIGINAL CONTRACT VALUE</div>
        <div style="margin:5px 0 2px;">
          <input type="number" class="ei" style="width:100%;font-size:14px;font-weight:700;text-align:center;background:rgba(255,255,255,.7)"
            placeholder="0" value="${initVal||""}"
            oninput="setFinancialBaseValue(this.value)"
            onchange="renderFinancial()">
        </div>
        <div class="fin-highlight-sub" style="font-size:9.5px;color:#059669;">↓ VO 합산 후 현재값: ${fmtMoney(curVal)}</div>
      </div>`
    : `<div class="fin-col fin-col-highlight">
        <div class="fin-highlight-lbl">CURRENT CONTRACT VALUE</div>
        <div class="fin-highlight-val">${initVal||list.length ? fmtMoney(curVal) : "—"}</div>
        <div class="fin-highlight-sub">${initVal||list.length
          ? `Original ${fmtMoney(initVal)}<br><span style="color:${diffClr}">${fmtSigned(totalDiff)}</span>`
          : "No contract value set"}</div>
      </div>`;

  // Financial notes
  let itemsBody = items.map((item,ii)=>`
    <div class="sum-item">
      <span class="sum-arrow" style="color:#065F46">▸</span>
      ${editMode
        ? `<input class="sum-ei" value="${esc(item)}"
            oninput="setFinancialNote(${ii},this.value)">
           <button class="sum-del" onclick="removeFinancialNote(${ii})">✕</button>`
        : `<span class="sum-text">${esc(item)}</span>`}
    </div>`).join("");
  if(!items.length && !editMode) itemsBody = `<div style="color:#9ca3af;font-size:12px;padding:4px 0;">No notes yet</div>`;
  if(editMode) itemsBody += `<button class="btn btn-sm" style="background:#065F46;margin-top:4px;padding:3px 9px;font-size:11px;"
    onclick="addFinancialNote()">+ Add Item</button>`;

  // VO history
  let voBody;
  if(list.length===0 && !editMode){
    voBody = `<div style="padding:6px 0;color:#9ca3af;font-size:12px;">No VOs recorded yet</div>`;
  } else {
    voBody = list.map((v,i)=>{
      const before = Number(v.before)||0, after = Number(v.after)||0;
      const diff = after - before;
      const pct = before ? (diff/before*100) : 0;
      const dCls = diff>0 ? "up" : diff<0 ? "down" : "flat";
      if(editMode){
        return `<div class="vo-chip vo-chip-edit">
          <button class="vo-del-btn" onclick="deleteVo(${i})">✕</button>
          <input class="ei" style="font-size:11px;margin-bottom:3px" value="${esc(v.id)}" placeholder="VO No."
            oninput="setVoField(${i},'id',this.value)">
          <input class="ei" style="font-size:11px;margin-bottom:3px" value="${esc(v.date)}" placeholder="Date"
            oninput="setVoField(${i},'date',this.value)">
          <input class="ei" style="font-size:11px;margin-bottom:3px" value="${esc(v.desc)}" placeholder="VO description"
            oninput="setVoField(${i},'desc',this.value)">
          <div style="display:flex;align-items:center;gap:3px;">
            <input type="number" class="ei" style="width:42%;font-size:11px" value="${before}" placeholder="Before"

          <div class="vo-chip-price">
            <span>${fmtMoney(before)}</span><span>→</span><span>${fmtMoney(after)}</span>
            <span class="vo-chip-delta ${dCls}">${fmtSigned(diff)} (${diff>0?"+":diff<0?"-":""}${Math.abs(pct).toFixed(1)}%)</span>
          </div>
        </div>`;
      }
    }).join("");
  }
  const voAddBtn = editMode ? `<button class="btn btn-sm vo-add-chip" onclick="addVo()">+ Add VO</button>` : "";

  // Currency dropdown — applies to active series or ALL
  const curCurrency = sf.currency||"USD";
  const currencySelect = `<select class="esel" style="width:auto;font-size:11px;font-weight:700;color:#065F46;border-color:#86EFAC"
    onchange="setFinancialCurrency(this.value)">

function addVo(){

}
function setVoField(idx, field, val){

function buildProjectTitle(m){
  const sy = (m.shipyard||"").trim();
  const hn = (m.hullNum||"").trim();
  const pt = (m.projType||"").trim();
  if(!sy && !hn && !pt) return m.name || "New Project";
  return [sy, hn ? hn+"s" : "", pt, "Project"].filter(Boolean).join(" ");
}

function syncProjName(){

  const d = getCurrent();

  m.name = buildProjectTitle(m);
  syncProjName();
  syncDeliveryVessels(d);
  renderChecklist();

async function addProject(){

  const pid = "proj_"+Date.now();

  projects.push({id:pid,name,color});
  projData[pid] = {meta:defaultMeta(name),stages:defaultStages(),cats:defaultCats(),summary:defaultSummary(),deliveryChecklist:defaultChecklist()};
  await writeToFile();
  selectProject(pid);
}

/* ── TOTAL DELIVERY PIVOT ── */
let tdSortDir = 1; // 1=asc, -1=desc

function gatherDeliveryRows(){
  const rows = [];
  projects.forEach(proj=>{
    const d = projData[proj.id];
    if(!d || !d.deliveryChecklist) return;
    d.deliveryChecklist.forEach(grp=>{
      grp.items.forEach((it, ii)=>{
        rows.push({
          projId: proj.id,
          gi: d.deliveryChecklist.indexOf(grp),
          ii,
          project: proj.name,
          vessel: grp.name||"—",
          item: it.name||"—",
          deliveryDate: it.deliveryDate||"",
          gr: it.gr||"X",
          comment: it.comment||""
        });
      });
    });
  });
  return rows;
}

function parseTdDate(s){
  if(!s) return null;
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function renderTotalDelivery(){
  const rows = gatherDeliveryRows();
  rows.sort((a,b)=>{
    const da = parseTdDate(a.deliveryDate), db = parseTdDate(b.deliveryDate);
    if(!da && !db) return 0;
    if(!da) return 1; if(!db) return -1;
    return tdSortDir * (da - db);
  });

  const arrow = tdSortDir===1 ? "▲" : "▼";
  const html = rows.length===0
    ? `<div style="padding:20px;text-align:center;color:#9ca3af;">데이터가 없습니다.</div>`
    : `<table class="td-tbl">
        <thead><tr>
          <th>Project</th>
          <th>Vessel</th>
          <th>Item</th>
          <th class="sortable" onclick="tdToggleSort()" title="정렬">Delivery Date ${arrow}</th>
          <th>GR</th>
          <th>Comment</th>
        </tr></thead>
        <tbody>${rows.map((r,idx)=>`
          <tr>
            <td style="font-size:12px;color:#6b7280;">${esc(r.project)}</td>
            <td style="font-weight:600;">${esc(r.vessel)}</td>
            <td>${esc(r.item)}</td>
            <td style="white-space:nowrap;font-weight:600;">${esc(r.deliveryDate)||"—"}</td>
            <td class="${r.gr==="O"?"td-gr-o":"td-gr-x"}">${r.gr}</td>
            <td><input class="td-comment-input" value="${esc(r.comment)}" placeholder="메모..."
              oninput="saveTdComment('${r.projId}',${r.gi},${r.ii},this.value)"></td>
          </tr>`).join("")}
        </tbody>
      </table>`;

  document.getElementById("td-table-wrap").innerHTML = html;
}

function tdToggleSort(){
  tdSortDir *= -1;
  renderTotalDelivery();
}

function saveTdComment(projId, gi, ii, val){
  const d = projData[projId];
  if(d && d.deliveryChecklist[gi] && d.deliveryChecklist[gi].items[ii]){
    d.deliveryChecklist[gi].items[ii].comment = val;
  }
}

function openTotalDelivery(){
  renderTotalDelivery();
  document.getElementById("total-delivery-overlay").classList.add("show");
}

function closeTotalDelivery(){
  document.getElementById("total-delivery-overlay").classList.remove("show");
}

function moveProject(pid, dir){
  const idx = projects.findIndex(p=>p.id===pid);
  if(idx===-1) return;
  const to = idx + dir;
  if(to < 0 || to >= projects.length) return;
  // swap in projects array
  [projects[idx], projects[to]] = [projects[to], projects[idx]];
  renderSidebar();
}

async function deleteProject(pid){
  if(!confirm(`Delete project "${projects.find(p=>p.id===pid)?.name}"?`)) return;
  projects = projects.filter(p=>p.id!==pid);
  delete projData[pid];
  await writeToFile();
  activeId = projects[0]?.id||null;
  render();
}
